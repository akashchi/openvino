name: Deploy MQ Dashboard

on:
  push:
    branches:
      - main
      - ci/gha/ci-doctor-dashboard
    paths:
      - 'mq/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}dashboard/
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        ref: ci/gha/ci-doctor-dashboard

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          # Serves mq/ as the Pages root so that the dashboard's relative
          # fetch paths (../investigations/, ../patterns/) resolve correctly.
          path: mq/

      - uses: actions/deploy-pages@v4
        id: deployment
